apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: policy-docs
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/part-of: ggi-policy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
        app.kubernetes.io/part-of: ggi-policy
    spec:
      serviceAccountName: oauth2-proxy
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          imagePullPolicy: IfNotPresent
          args:
            - --provider=oidc
            - --provider-display-name=GGenomics SSO
            # TODO(operator): confirm the Entra OIDC issuer URL for your tenant.
            # Find it at https://login.microsoftonline.com/{tenant-id}/v2.0
            # The placeholder uses ${TENANT_ID} — substitute or set via env.
            - --oidc-issuer-url=https://login.microsoftonline.com/${TENANT_ID}/v2.0
            - --redirect-url=https://policy.ggenomics.internal/oauth2/callback
            - --upstream=static://200
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --email-domain=ggenomics.com
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-domain=policy.ggenomics.internal
            - --cookie-name=_ggi_policy_oauth2
            - --cookie-expire=12h
            - --skip-provider-button=true
            - --pass-access-token=false
            - --set-xauthrequest=true
            - --silence-ping-logging=true
          env:
            - name: TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: tenant_id
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: client_id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: client_secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: cookie_secret
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
