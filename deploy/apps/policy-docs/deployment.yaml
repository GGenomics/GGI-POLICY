apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-docs
  namespace: policy-docs
  labels:
    app.kubernetes.io/name: policy-docs
    app.kubernetes.io/part-of: ggi-policy
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: policy-docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy-docs
        app.kubernetes.io/part-of: ggi-policy
    spec:
      serviceAccountName: policy-docs
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          # Image tag is rewritten by Flux ImageUpdateAutomation. Anything that
          # matches the ImagePolicy in deploy/flux/image-automation/ is valid.
          # Initial value is `latest` (always present in GHCR after Phase 3's first
          # build) so the very first reconcile pulls a known-good image. Flux's
          # ImageUpdateAutomation then rewrites this line to the highest main-{N}
          # tag on its next 5-minute interval.
          image: ghcr.io/ggenomics/ggi-policy-site:latest # {"$imagepolicy": "policy-docs:policy-docs-image"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-pid
              mountPath: /var/run
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-cache
          emptyDir: { sizeLimit: 64Mi }
        - name: nginx-pid
          emptyDir: { sizeLimit: 4Mi }
        - name: nginx-config
          configMap:
            name: policy-docs-nginx-conf
---
# Minimal nginx config that listens on a non-privileged port (8080) so the
# pod can run as a non-root user. The default nginx:alpine config listens on
# 80 which requires root; we override here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: policy-docs-nginx-conf
  namespace: policy-docs
data:
  default.conf: |
    server {
        listen 8080 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ $uri.html =404;
        }
        # Cache static assets aggressively; HTML is rebuilt on every push.
        location ~* \.(css|js|png|jpg|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
