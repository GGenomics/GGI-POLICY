apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: policy-docs

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: ggi-policy
      app.kubernetes.io/managed-by: flux

resources:
  - namespace.yaml
  - service-account.yaml
  - vault-static-secret.yaml
  - deployment.yaml
  - service.yaml
  - oauth2-proxy.deployment.yaml
  - oauth2-proxy.service.yaml
  - ingress.yaml

# Note: Deployment.spec.selector.matchLabels is immutable. Whatever labels
# end up in the rendered selector after the labels: block above CANNOT be
# changed in-place; doing so requires deleting and recreating the Deployment
# (= a brief outage). If you ever need to add/rename a label here, plan for
# a controlled redeploy.
images:
  # Flux ImageUpdateAutomation rewrites the `newTag:` value in this block
  # whenever the ImagePolicy selects a new tag. Initial value `latest` is
  # always present in GHCR after Phase 3's first build; Flux replaces it
  # with the highest main-{N} tag on the next 5-minute reconcile.
  - name: ghcr.io/ggenomics/ggi-policy-site
    newTag: latest
