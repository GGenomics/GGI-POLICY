name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest

      - name: Run repo-wide validation
        run: uv run ggi-policy validate

      - name: Check crosswalks are up to date
        run: uv run ggi-policy build-crosswalks --check

      - name: Validate deployment manifests
        run: |
          uv run python -c "
          from pathlib import Path
          from ggi_policy import manifests
          errors = manifests.validate(Path('deploy'))
          if errors:
              for e in errors: print(e)
              raise SystemExit(1)
          print('OK: deploy/ manifests valid')
          "
